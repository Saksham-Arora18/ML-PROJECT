<!DOCTYPE html>
<html>
<head>
    <title>Home Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        nav {
            background-color: #333;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

        .hero {
            padding: 60px 20px;
            background-color: #f2f2f2;
        }

        .hero h1 {
            margin-bottom: 10px;
        }

        button {
            padding: 8px 20px;
            border: none;
            background-color: #333;
            color: white;
            cursor: pointer;
        }

        .section {
            padding: 40px 20px;
        }

        footer {
            background-color: #333;
            color: white;
            padding: 10px;
        }
    </style>
</head>

<body>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <div class="hero">
        <h1>Welcome to My Website</h1>
        <p>This is a simple and lightweight homepage.</p>
        <button>Get Started</button>
    </div>

    <div class="section">
        <h2>About Us</h2>
        <p>This page is fast and clean. No heavy design.</p>
    </div>

    <footer>
        © 2026 My Website
    </footer>

</body>
</html>
